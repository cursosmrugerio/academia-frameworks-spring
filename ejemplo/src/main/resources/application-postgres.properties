# Perfil "postgres": persistencia de negocio en PostgreSQL (Módulo 6).
# Requiere la base de datos arriba: `docker compose up -d`.
# Activar con: mvn spring-boot:run -Dspring-boot.run.profiles=postgres
spring.datasource.url=jdbc:postgresql://localhost:5432/banca
spring.datasource.username=banca
spring.datasource.password=banca
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
