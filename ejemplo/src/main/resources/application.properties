# Ejemplo BPM Kogito + Spring Boot.
spring.application.name=banca-bpm-ejemplo
server.address=0.0.0.0

# --- Persistencia del MOTOR BPM (Kogito): en memoria por ahora.
#     (En el Módulo 6 se conecta a PostgreSQL con el add-on de persistencia.)
# --- Persistencia de NEGOCIO (Spring Data JPA): H2 en memoria (perfil por defecto).
#     Para PostgreSQL: `docker compose up -d` y arrancar con --spring.profiles.active=postgres
#     (configuración en application-postgres.properties).
spring.datasource.url=jdbc:h2:mem:banca;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true

# --- Spring Batch (Módulo 6): no ejecutar jobs al arrancar (se lanzan a propósito desde la prueba).
spring.batch.job.enabled=false
